[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# The parallelbase.io -> app.parallelbase.io proxy is handled by the edge
# function at netlify/edge-functions/app-proxy.ts (it runs before redirects, so
# it can proxy unknown paths without clobbering the Next.js image optimizer).
